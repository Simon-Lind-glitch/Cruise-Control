name: Release

on:
  push:
    branches: [main]

# semantic-release pushes the version-bump commit + tag and creates the GitHub Release.
permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two releases at once; let an in-flight one finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json

      # Gate the release on a green suite — never cut a version from red.
      - name: Test (build + unit + e2e)
        working-directory: cli
        run: |
          npm ci
          npm test

      - name: Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
